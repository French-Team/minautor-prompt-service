name: Validate

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '22'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        # 'npm ci' strict FAILS sur EBADPLATFORM quand le lockfile contient des optionalDependencies multiplateformes (ex. @rolldown/binding-android-arm64) que la CI Linux/x64 ne peut pas installer. On utilise 'npm install --os=linux --cpu=x64 --libc=glibc --include=optional' qui filtre par plateforme tout en installant les optionnels compatibles avec Linux/x64/glibc (notamment @esbuild/linux-x64-gnu et @rolldown/binding-linux-x64-gnu utilisés par Nuxt/Vite).
        run: npm install --os=linux --cpu=x64 --libc=glibc --include=optional

      - name: 🏗️ Build + Typecheck + Test + Lint
        run: npm run validate
