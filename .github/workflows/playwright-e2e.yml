name: E2E Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '22'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        # 'npm ci' strict FAILS sur EBADPLATFORM quand le lockfile contient des optionalDependencies multiplateformes (ex. @rolldown/binding-android-arm64) que la CI Linux/x64 ne peut pas installer. On utilise 'npm install --os=linux --cpu=x64 --libc=glibc --include=optional' qui filtre par plateforme tout en installant les optionnels compatibles avec Linux/x64/glibc (notamment @rolldown/binding-linux-x64-gnu et @esbuild/linux-x64-gnu utilisés par Nuxt/Vite).
        run: npm install --os=linux --cpu=x64 --libc=glibc --include=optional

      - name: 🏗️ Build Nuxt app
        run: npm run build

      - name: 🎭 Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: 🎭 Install Playwright browsers + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: 🎭 Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: 🧪 Run Playwright e2e tests
        run: npx playwright test

      - name: 📊 Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
